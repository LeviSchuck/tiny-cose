name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write # Used for OIDC to Codecov
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno fmt --check
      - name: Lint source
        run: deno lint
      - name: Test with coverage output
        run: deno test --doc --coverage=coverage
      - name: Convert coverage details to a report file
        run: deno coverage ./coverage --lcov > coverage.lcov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.lcov
      # When tagged, prepare it for publishing
      - name: Get tag version
        if: startsWith(github.ref, 'refs/tags/')
        id: get_tag_version
        run: echo TAG_VERSION=${GITHUB_REF/refs\/tags\//} >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v5
        if: startsWith(github.ref, 'refs/tags/')
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - name: npm build
        if: startsWith(github.ref, 'refs/tags/')
        run: deno task npm ${{steps.get_tag_version.outputs.TAG_VERSION}}
      - name: npm publish
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public
